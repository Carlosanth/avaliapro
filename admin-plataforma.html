<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvaliaPro — Painel da Plataforma</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1115; color: #e5e7eb; min-height: 100vh;
  }
  :root {
    --surface: #1a1d24; --surface2: #22262f; --border: #2e3340;
    --text-muted: #9099ab; --accent: #6366f1; --accent-bg: #1e1b4b;
    --danger: #ef4444; --danger-bg: #3f1d1d; --success: #22c55e; --success-bg: #14291d;
    --warn: #f59e0b; --warn-bg: #3a2a0f;
  }
  #login-view { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 100%; max-width: 380px; }
  .login-box h1 { font-size: 18px; margin-bottom: 4px; }
  .login-box p.sub { color: var(--text-muted); font-size: 12px; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
  input, select {
    width: 100%; padding: 9px 10px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: #e5e7eb; font-size: 13px;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .btn {
    padding: 9px 16px; border-radius: 7px; border: none; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: #e5e7eb; border: 1px solid var(--border); }
  .btn-block { width: 100%; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .error-box { background: var(--danger-bg); color: #fca5a5; padding: 10px 12px; border-radius: 7px; font-size: 12px; margin-bottom: 14px; display: none; }

  #app-view { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .topbar h1 { font-size: 20px; }
  .topbar p { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }

  .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-trial { background: var(--warn-bg); color: var(--warn); }
  .badge-ativa { background: var(--success-bg); color: var(--success); }
  .badge-expirada, .badge-cancelada { background: var(--danger-bg); color: var(--danger); }

  .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
  .toast {
    position: fixed; bottom: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border);
    padding: 10px 16px; border-radius: 8px; font-size: 13px; display: none; z-index: 999;
  }
</style>
</head>
<body>

<div id="login-view">
  <div class="login-box">
    <h1>🔐 Painel da Plataforma</h1>
    <p class="sub">Acesso restrito — administração do AvaliaPro</p>
    <div class="error-box" id="login-error"></div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="login-email" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLoginPlataforma()">
    </div>
    <button class="btn btn-primary btn-block" onclick="doLoginPlataforma()">Entrar</button>
  </div>
</div>

<div id="app-view">
  <div class="topbar">
    <div>
      <h1>Painel da Plataforma</h1>
      <p id="topbar-sub">Gestão de contas do AvaliaPro</p>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="sairPlataforma()">Sair</button>
  </div>
  <div class="card">
    <div id="empresas-wrap" class="loading">Carregando...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="admin-plataforma.js"></script>
</body>
</html>
