<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Fornecedor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #EFEBE6; --surface: #ffffff; --surface2: #E5E2DD;
    --border: #D9D2C6; --navy: #083C51; --text: #0A2E3D; --text-muted: #839198;
    --accent: #3F7D8C; --accent-bg: #E3EEF0; --tan: #A28F6A;
    --danger: #dc2626; --danger-bg: #fef2f2;
    --success: #16a34a; --success-bg: #f0fdf4;
    --warn: #d97706; --warn-bg: #fffbeb;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .top-brand {
    background: var(--navy); color: #fff; padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .top-brand-seal { width: 26px; height: 26px; flex-shrink: 0; }
  .top-brand-text b { font-size: 14px; display: block; }
  .top-brand-text span { font-size: 11px; color: rgba(229,226,221,0.7); }

  .wrap { max-width: 620px; margin: 0 auto; padding: 32px 20px 20px; }

  /* ---------- Cabeçalho ---------- */
  .head-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
  .head-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
  .head-title { font-size: 23px; font-weight: 800; color: var(--navy); line-height: 1.2; }
  .head-timer { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; white-space: nowrap; padding-top: 5px; flex-shrink: 0; }
  .head-timer .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .head-timer.expirando { color: var(--danger); }
  .head-timer.expirando .dot { background: var(--danger); }
  .head-timer b { color: var(--text); font-variant-numeric: tabular-nums; }
  .head-timer.expirando b { color: var(--danger); }
  .head-empresa { padding-bottom: 18px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .head-empresa-nome { font-weight: 700; font-size: 14px; color: var(--navy); }
  .head-empresa-sub { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }

  /* ---------- Card do documento ---------- */
  .doc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 18px; }
  .doc-alert { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 22px; font-size: 11px; font-weight: 700; letter-spacing: .02em; }
  .doc-alert.alert-danger { background: var(--danger-bg); color: var(--danger); }
  .doc-alert.alert-warn { background: var(--warn-bg); color: var(--warn); }
  .doc-alert.alert-pendente { background: var(--surface2); color: var(--text-muted); }
  .doc-id { font-weight: 600; opacity: .7; letter-spacing: .02em; flex-shrink: 0; }
  .doc-card-body { padding: 22px 24px 24px; }
  .doc-title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 5px; }
  .doc-desc { font-size: 12.5px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }

  .doc-fields { display: flex; gap: 14px; margin-bottom: 18px; }
  .field { flex: 1; min-width: 0; }
  .field label { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
  input { width: 100%; padding: 10px 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit; }
  input:focus { outline: none; border-color: var(--accent); }
  input[disabled] { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; opacity: .85; }

  .dropzone-label { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .dropzone {
    border: 1.5px dashed var(--border); border-radius: 10px;
    padding: 28px 16px; text-align: center; cursor: pointer;
    transition: all .15s ease; background: var(--surface2); margin-bottom: 20px;
  }
  .dropzone:hover, .dropzone.dragover { border-color: var(--accent); background: var(--accent-bg); }
  .dropzone.has-file { border-color: var(--success); background: var(--success-bg); }
  .dz-icon { color: var(--text-muted); margin-bottom: 10px; }
  .dropzone.has-file .dz-icon { color: var(--success); }
  .dz-main { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 3px; }
  .dropzone.has-file .dz-main { color: var(--success); }
  .dz-sub { font-size: 11px; color: var(--text-muted); }

  .btn-submit {
    width: 100%; padding: 13px 18px; border: none; border-radius: 9px;
    background: var(--navy); color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 8px; transition: background .15s ease; font-family: inherit;
  }
  .btn-submit:hover:not(:disabled) { background: var(--accent); }
  .btn-submit:disabled { opacity: .55; cursor: not-allowed; }

  .badge-pendente-card { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-muted); padding: 4px 0 2px; }

  /* ---------- Rodapé ---------- */
  .foot-trust { display: flex; justify-content: center; gap: 22px; margin-top: 24px; font-size: 11.5px; color: var(--text-muted); flex-wrap: wrap; }
  .foot-trust span { display: flex; align-items: center; gap: 6px; }
  .dot-ok { width: 6px; height: 6px; border-radius: 50%; background: var(--success); display: inline-block; flex-shrink: 0; }
  .foot-copy { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 10px; padding-bottom: 28px; }

  .empty, .erro, .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }
  .erro { color: var(--danger); }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; display: none; z-index: 999; }
</style>
</head>
<body>

<div class="top-brand">
  <svg class="top-brand-seal" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="54" stroke="currentColor" stroke-width="2" stroke-dasharray="3 5"/>
    <circle cx="60" cy="60" r="44" stroke="currentColor" stroke-width="1.2"/>
    <path d="M40 61 L53 75 L82 45" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div class="top-brand-text">
    <b>AvaliaPro</b>
    <span>Gestão de Qualificação de Fornecedores</span>
  </div>
</div>

<div class="wrap">
  <div class="head-top">
    <div>
      <p class="head-eyebrow">Portal do Fornecedor</p>
      <h1 class="head-title">Atualização de Documentos</h1>
    </div>
    <div class="head-timer" id="head-timer"><span class="dot"></span>Sessão expira em <b id="timer-valor">15:00</b></div>
  </div>
  <div class="head-empresa">
    <p class="head-empresa-nome" id="head-fornecedor-nome">Carregando...</p>
    <p class="head-empresa-sub" id="head-sub"></p>
  </div>

  <div id="conteudo"><div class="loading">Carregando seus documentos...</div></div>

  <div class="foot-trust">
    <span><span class="dot-ok"></span>Servidor Seguro SSL</span>
    <span><span class="dot-ok"></span>LGPD Compliance</span>
  </div>
  <div class="foot-copy" id="foot-copy"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://qmvfsgwzbrhbxyonntgh.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_JjiXWFQTcOrUf5RXjsfeVw_5cwLPHf3';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

// Troque aqui se o telefone/e-mail de suporte for outro.
const SUPORTE_CONTATO = '0800 722 0000';

const params = new URLSearchParams(window.location.search);
const token = params.get('token');

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}

function fileParaBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const ICON_CLOCK = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
const ICON_CHECK = '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
const ICON_CHECK_SM = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
const ICON_UPLOAD = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';

// Gera um código curto só pra exibição (não é um ID sequencial de verdade — é derivado do uuid do documento).
function docCodigo(id) {
  return (id || '').replace(/[^a-zA-Z0-9]/g, '').slice(0, 4).toUpperCase() || '0000';
}

// ---------- Timer de sessão (só visual — não é a expiração real do token) ----------
let segundosRestantes = 15 * 60;
let timerId = null;
function iniciarTimerSessao() {
  const valorEl = document.getElementById('timer-valor');
  const wrapEl = document.getElementById('head-timer');
  if (timerId) clearInterval(timerId);
  const tick = () => {
    const min = Math.floor(segundosRestantes / 60);
    const seg = segundosRestantes % 60;
    if (valorEl) valorEl.textContent = `${String(min).padStart(2, '0')}:${String(seg).padStart(2, '0')}`;
    if (wrapEl) wrapEl.classList.toggle('expirando', segundosRestantes <= 60);
    if (segundosRestantes <= 0) {
      clearInterval(timerId);
      document.getElementById('conteudo').innerHTML = '<div class="erro">Sua sessão expirou por segurança. Peça um novo link pra quem te enviou.</div>';
      return;
    }
    segundosRestantes--;
  };
  tick();
  timerId = setInterval(tick, 1000);
}

async function carregar() {
  document.getElementById('foot-copy').textContent = `AvaliaPro © ${new Date().getFullYear()} • Todos os direitos reservados. • Suporte: ${SUPORTE_CONTATO}`;

  if (!token) {
    document.getElementById('conteudo').innerHTML = '<div class="erro">Link inválido. Peça o link correto pra quem te enviou.</div>';
    document.getElementById('head-fornecedor-nome').textContent = '';
    document.getElementById('head-sub').textContent = '';
    return;
  }

  const { data, error } = await supabaseClient.functions.invoke('portal-fornecedor-dados', { body: { token } });

  if (error || !data || data.ok === false) {
    document.getElementById('conteudo').innerHTML = `<div class="erro">${(data && data.error) || 'Não foi possível carregar. Tente novamente.'}</div>`;
    document.getElementById('head-fornecedor-nome').textContent = '';
    document.getElementById('head-sub').textContent = '';
    return;
  }

  document.getElementById('head-fornecedor-nome').textContent = data.fornecedorNome;
  // data.fornecedorCnpj é opcional — se sua Edge Function não devolver esse campo, essa linha só some.
  document.getElementById('head-sub').textContent = data.fornecedorCnpj
    ? `CNPJ: ${data.fornecedorCnpj} — ${data.empresaNome}`
    : data.empresaNome;

  renderDocumentos(data.documentos, data.pendentesIds);
  iniciarTimerSessao();
}

function alertaInfo(doc, pendente) {
  if (pendente) return { classe: 'alert-pendente', texto: 'ENVIADO — AGUARDANDO APROVAÇÃO' };
  if (doc.estado === 'vencido') {
    const dias = Math.abs(doc.dias);
    return { classe: 'alert-danger', texto: `AÇÃO NECESSÁRIA: VENCIDO HÁ ${dias} DIA${dias === 1 ? '' : 'S'}` };
  }
  return { classe: 'alert-warn', texto: `AÇÃO NECESSÁRIA: VENCE EM ${doc.dias} DIA${doc.dias === 1 ? '' : 'S'}` };
}

function renderDocumentos(documentos, pendentesIds) {
  const wrap = document.getElementById('conteudo');
  if (!documentos.length) {
    wrap.innerHTML = `<div class="empty" style="display:flex; flex-direction:column; align-items:center; gap:10px; color:var(--success)">${ICON_CHECK}<span style="color:var(--text-muted)">Nenhum documento pendente no momento.</span></div>`;
    return;
  }

  wrap.innerHTML = documentos.map(doc => {
    const pendente = pendentesIds.includes(doc.id);
    const alerta = alertaInfo(doc, pendente);
    const dataAtualFormatada = new Date(doc.validade + 'T00:00:00').toLocaleDateString('pt-BR');

    return `
      <div class="doc-card">
        <div class="doc-alert ${alerta.classe}">
          <span>${alerta.texto}</span>
          <span class="doc-id">ID #DOC ${docCodigo(doc.id)}</span>
        </div>
        <div class="doc-card-body">
          <h2 class="doc-title">${doc.nome}</h2>
          <p class="doc-desc">Este documento é obrigatório para manter sua qualificação ativa no sistema.</p>
          ${pendente ? `
            <div class="badge-pendente-card">${ICON_CLOCK} Já enviamos seu arquivo — aguardando aprovação.</div>
          ` : `
            <div class="doc-fields">
              <div class="field">
                <label>Validade atual</label>
                <input type="text" value="${dataAtualFormatada}" disabled>
              </div>
              <div class="field">
                <label>Nova validade</label>
                <input type="date" id="validade-${doc.id}">
              </div>
            </div>

            <label class="dropzone-label">Arquivo do documento</label>
            <div class="dropzone" id="filedrop-${doc.id}" onclick="document.getElementById('arquivo-${doc.id}').click()">
              <input type="file" id="arquivo-${doc.id}" accept=".pdf,.png,.jpg,.jpeg" style="display:none" onchange="previewArquivoPortal('${doc.id}', this)">
              <div id="dropzone-inner-${doc.id}">
                <div class="dz-icon">${ICON_UPLOAD}</div>
                <p class="dz-main">Clique para escolher ou arraste o arquivo</p>
                <p class="dz-sub">PDF, JPG ou PNG até 10MB</p>
              </div>
            </div>

            <button class="btn-submit" id="btn-${doc.id}" onclick="enviarDocumento('${doc.id}')">Enviar Documento →</button>
          `}
        </div>
      </div>`;
  }).join('');

  documentos.forEach(doc => {
    if (!pendentesIds.includes(doc.id)) wireDropzone(doc.id);
  });
}

function wireDropzone(docId) {
  const zone = document.getElementById(`filedrop-${docId}`);
  const input = document.getElementById(`arquivo-${docId}`);
  if (!zone || !input) return;

  ['dragover', 'dragenter'].forEach(evt => zone.addEventListener(evt, e => {
    e.preventDefault();
    zone.classList.add('dragover');
  }));
  ['dragleave', 'dragend'].forEach(evt => zone.addEventListener(evt, () => {
    zone.classList.remove('dragover');
  }));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      input.files = e.dataTransfer.files;
      previewArquivoPortal(docId, input);
    }
  });
}

function previewArquivoPortal(docId, input) {
  const zone = document.getElementById(`filedrop-${docId}`);
  const inner = document.getElementById(`dropzone-inner-${docId}`);
  if (input.files && input.files[0] && inner) {
    inner.innerHTML = `
      <div class="dz-icon">${ICON_CHECK_SM}</div>
      <p class="dz-main">${input.files[0].name}</p>
      <p class="dz-sub">Clique ou arraste outro arquivo pra trocar</p>
    `;
    if (zone) zone.classList.add('has-file');
  }
}

async function enviarDocumento(docId) {
  const validade = document.getElementById(`validade-${docId}`).value;
  const fileInput = document.getElementById(`arquivo-${docId}`);
  const file = fileInput.files[0];
  const btn = document.getElementById(`btn-${docId}`);

  if (!validade) { toast('Informe a nova validade.'); return; }
  if (!file) { toast('Selecione o arquivo.'); return; }

  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    const arquivoBase64 = await fileParaBase64(file);
    const { data, error } = await supabaseClient.functions.invoke('portal-fornecedor-enviar-documento', {
      body: { token, documentoId: docId, novaValidade: validade, nomeArquivo: file.name, arquivoBase64 },
    });

    if (error || !data || data.ok === false) {
      toast((data && data.error) || (error && error.message) || 'Erro ao enviar. Tente novamente.');
      btn.disabled = false;
      btn.textContent = 'Enviar Documento →';
      return;
    }

    toast('Documento enviado! Aguarde a aprovação.');
    carregar();
  } catch (e) {
    toast('Erro ao enviar o arquivo.');
    btn.disabled = false;
    btn.textContent = 'Enviar Documento →';
  }
}

carregar();
</script>
</body>
</html>
