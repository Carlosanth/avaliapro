<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Fornecedor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #EFEBE6; --surface: #ffffff; --surface2: #E5E2DD;
    --border: #D9D2C6; --navy: #083C51; --text: #0A2E3D; --text-muted: #839198;
    --accent: #3F7D8C; --tan: #A28F6A;
    --danger: #dc2626; --danger-bg: #fef2f2;
    --success: #16a34a; --success-bg: #f0fdf4;
    --warn: #d97706; --warn-bg: #fffbeb;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .top-brand {
    background: var(--navy); color: #fff; padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .top-brand-seal { width: 26px; height: 26px; flex-shrink: 0; }
  .top-brand-text b { font-size: 14px; display: block; }
  .top-brand-text span { font-size: 11px; color: rgba(229,226,221,0.7); }
  .wrap { max-width: 760px; margin: 0 auto; padding: 24px 20px; }
  .head { margin-bottom: 20px; }
  .head h1 { font-size: 18px; margin-bottom: 4px; color: var(--navy); }
  .head p { color: var(--text-muted); font-size: 13px; }
  .grid-docs { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; }
  .doc-nome { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: var(--navy); }
  .doc-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; margin-bottom: 8px; width: fit-content; }
  .badge-danger { background: var(--danger-bg); color: var(--danger); }
  .badge-warn { background: var(--warn-bg); color: var(--warn); }
  .badge-pendente { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .form-row-flex { display: flex; gap: 10px; margin-bottom: 12px; }
  .form-row-flex .form-group { flex: 1; margin-bottom: 0; min-width: 0; }
  .form-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
  input { width: 100%; padding: 9px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 13px; }
  input:focus { outline: none; border-color: var(--accent); }
  .file-drop {
    display: flex; align-items: center; gap: 6px;
    height: 36px; padding: 0 10px;
    border: 1.5px dashed var(--border);
    border-radius: 7px;
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 12.5px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .file-drop:hover { border-color: var(--accent); background: var(--surface); }
  .file-drop.has-file { border-color: var(--accent); color: var(--accent); background: var(--surface); }
  .file-drop svg { flex-shrink: 0; }
  .file-drop span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn { padding: 9px 16px; border-radius: 7px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; margin-top: auto; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .empty, .erro, .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }
  .erro { color: var(--danger); }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; display: none; z-index: 999; }
</style>
</head>
<body>

<div class="top-brand">
  <svg class="top-brand-seal" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="54" stroke="currentColor" stroke-width="2" stroke-dasharray="3 5"/>
    <circle cx="60" cy="60" r="44" stroke="currentColor" stroke-width="1.2"/>
    <path d="M40 61 L53 75 L82 45" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div class="top-brand-text">
    <b>AvaliaPro</b>
    <span>Gestão de Qualificação de Fornecedores</span>
  </div>
</div>

<div class="wrap">
  <div class="head">
    <h1 style="display:flex; align-items:center; gap:8px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg> Portal do Fornecedor</h1>
    <p id="head-sub">Carregando...</p>
  </div>
  <div id="conteudo"><div class="loading">Carregando seus documentos...</div></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://qmvfsgwzbrhbxyonntgh.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_JjiXWFQTcOrUf5RXjsfeVw_5cwLPHf3';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

const params = new URLSearchParams(window.location.search);
const token = params.get('token');

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}

function fileParaBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const ICON_PAPERCLIP = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>';
const ICON_CLOCK = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
const ICON_CHECK = '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';

async function carregar() {
  if (!token) {
    document.getElementById('conteudo').innerHTML = '<div class="erro">Link inválido. Peça o link correto pra quem te enviou.</div>';
    document.getElementById('head-sub').textContent = '';
    return;
  }

  const { data, error } = await supabaseClient.functions.invoke('portal-fornecedor-dados', { body: { token } });

  if (error || !data || data.ok === false) {
    document.getElementById('conteudo').innerHTML = `<div class="erro">${(data && data.error) || 'Não foi possível carregar. Tente novamente.'}</div>`;
    document.getElementById('head-sub').textContent = '';
    return;
  }

  document.getElementById('head-sub').textContent = `${data.fornecedorNome} — ${data.empresaNome}`;
  renderDocumentos(data.documentos, data.pendentesIds);
}

function renderDocumentos(documentos, pendentesIds) {
  const wrap = document.getElementById('conteudo');
  if (!documentos.length) {
    wrap.innerHTML = `<div class="empty" style="display:flex; flex-direction:column; align-items:center; gap:10px; color:var(--success)">${ICON_CHECK}<span style="color:var(--text-muted)">Nenhum documento pendente no momento.</span></div>`;
    return;
  }

  wrap.innerHTML = `<div class="grid-docs">${documentos.map(doc => {
    const pendente = pendentesIds.includes(doc.id);
    const badge = pendente
      ? `<span class="badge badge-pendente">${ICON_CLOCK} Enviado, aguardando aprovação</span>`
      : (doc.estado === 'vencido' ? `<span class="badge badge-danger">VENCIDO há ${Math.abs(doc.dias)} dia(s)</span>` : `<span class="badge badge-warn">Vence em ${doc.dias} dia(s)</span>`);

    return `
      <div class="card">
        <span class="badge-wrap">${badge}</span>
        <div class="doc-nome">${doc.nome}</div>
        <div class="doc-meta">Validade atual: ${new Date(doc.validade + 'T00:00:00').toLocaleDateString('pt-BR')}</div>
        ${pendente ? '' : `
          <div class="form-row-flex">
            <div class="form-group">
              <label>Nova validade</label>
              <input type="date" id="validade-${doc.id}">
            </div>
            <div class="form-group">
              <label>Arquivo</label>
              <div class="file-drop" id="filedrop-${doc.id}" onclick="document.getElementById('arquivo-${doc.id}').click()">
                <input type="file" id="arquivo-${doc.id}" accept=".pdf,.png,.jpg,.jpeg" style="display:none" onchange="previewArquivoPortal('${doc.id}', this)">
                ${ICON_PAPERCLIP}<span id="arquivo-label-${doc.id}">Anexar arquivo</span>
              </div>
            </div>
          </div>
          <button class="btn btn-primary" id="btn-${doc.id}" onclick="enviarDocumento('${doc.id}')">Enviar</button>
        `}
      </div>`;
  }).join('')}</div>`;
}

function previewArquivoPortal(docId, input) {
  const label = document.getElementById(`arquivo-label-${docId}`);
  const drop = document.getElementById(`filedrop-${docId}`);
  if (input.files && input.files[0]) {
    label.textContent = input.files[0].name;
    if (drop) drop.classList.add('has-file');
  }
}

async function enviarDocumento(docId) {
  const validade = document.getElementById(`validade-${docId}`).value;
  const fileInput = document.getElementById(`arquivo-${docId}`);
  const file = fileInput.files[0];
  const btn = document.getElementById(`btn-${docId}`);

  if (!validade) { toast('Informe a nova validade.'); return; }
  if (!file) { toast('Selecione o arquivo.'); return; }

  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    const arquivoBase64 = await fileParaBase64(file);
    const { data, error } = await supabaseClient.functions.invoke('portal-fornecedor-enviar-documento', {
      body: { token, documentoId: docId, novaValidade: validade, nomeArquivo: file.name, arquivoBase64 },
    });

    if (error || !data || data.ok === false) {
      toast((data && data.error) || (error && error.message) || 'Erro ao enviar. Tente novamente.');
      btn.disabled = false;
      btn.textContent = 'Enviar';
      return;
    }

    toast('Documento enviado! Aguarde a aprovação.');
    carregar();
  } catch (e) {
    toast('Erro ao enviar o arquivo.');
    btn.disabled = false;
    btn.textContent = 'Enviar';
  }
}

carregar();
</script>
</body>
</html>
